<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#36d1dc,#5b86e5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
outline:none;
border-color:#5b86e5;
}

button{
width:100%;
padding:12px;
background:#5b86e5;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3f6bdc;
}

a{
text-decoration:none;
color:#5b86e5;
}

p{
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form id="signupForm">

<input type="text" id="username" placeholder="Username" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<button type="submit">Signup</button>

</form>

<p>Already have an account? <a href="./login.html">Login</a></p>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
getFirestore, 
collection, 
addDoc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


// Firebase configuration
const firebaseConfig = {

apiKey: "AIzaSyDj3BCOiJKM3Or_ndlo3GQ2kvYzYZNo2UI",

authDomain: "food-for-you-1b3cf.firebaseapp.com",

projectId: "food-for-you-1b3cf",

storageBucket: "food-for-you-1b3cf.appspot.com",

messagingSenderId: "1049634769049",

appId: "1:1049634769049:web:63256e43efc5d83fa29008"

};


// Initialize Firebase
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// Signup Form
document.getElementById("signupForm").addEventListener("submit", async function(e){

e.preventDefault();

const username = document.getElementById("username").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const confirm = document.getElementById("confirmPassword").value;

if(password !== confirm){

alert("Passwords do not match");
return;

}

try{

await addDoc(collection(db,"users"),{

username: username,
email: email,
password: password,

});

alert("Signup Successful:please login to continue");

window.location.href="./login.html";

}

catch(error){

console.error(error);
alert("Error saving data: " + error.message);

}

});

</script>

</body>
</html>
