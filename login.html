<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#36d1dc,#5b86e5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
outline:none;
border-color:#5b86e5;
}

button{
width:100%;
padding:12px;
background:#5b86e5;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3f6bdc;
}

p{
font-size:14px;
}

a{
text-decoration:none;
color:#5b86e5;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<input type="username" id="username" placeholder="Username" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account? <a href="signup.html">Signup</a></p>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDj3BCOiJKM3Or_ndlo3GQ2kvYzYZNo2UI",
authDomain: "food-for-you-1b3cf.firebaseapp.com",
projectId: "food-for-you-1b3cf",
storageBucket: "food-for-you-1b3cf.appspot.com",
messagingSenderId: "1049634769049",
appId: "1:1049634769049:web:63256e43efc5d83fa29008"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

let validUser = false;

try{

const querySnapshot = await getDocs(collection(db,"users"));

querySnapshot.forEach((doc)=>{

const user = doc.data();

if(user.username === username && user.password === password){

validUser = true;

}

});

if(validUser){

alert("Login Successful");

// save login session
localStorage.setItem("isLoggedIn","true");
localStorage.setItem("username",username);

// redirect
window.location.href="home.html";

}
else{

alert("Invalid credentials");

}

}
catch(error){

console.error(error);
alert("Database error");

}

});

</script>
