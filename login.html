<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* ===== LOGIN PAGE DESIGN ===== */

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background: white;
      padding: 35px;
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .form-container h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .form-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .form-container input:focus {
      outline: none;
      border-color: #5b86e5;
      box-shadow: 0 0 5px rgba(91,134,229,0.5);
    }

    .form-container button {
      width: 100%;
      padding: 12px;
      background: #5b86e5;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .form-container button:hover {
      background: #3f6bdc;
    }

    .form-container p {
      margin-top: 15px;
      font-size: 14px;
    }

    .form-container a {
      color: #5b86e5;
      text-decoration: none;
      font-weight: bold;
    }

    .form-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Login to Continue</h2>
    <form onsubmit="return loginUser()">
      <input type="text" id="loginUsername" placeholder="Username" required><br><br>
      <input type="password" id="loginPassword" placeholder="Password" required><br><br>
      <button type="submit">Login</button>
    </form>
    <p>New User? <a href="signup.html">Signup</a></p>

  </div>

  <script src="auth.js"></script>
</body>
</html>
